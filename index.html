<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - CatchUpify</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { font-size: 48px; margin-bottom: 10px; }
    h1 { color: #7C3AED; font-size: 28px; margin-bottom: 5px; }
    .tagline { color: #666; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #7C3AED; }
    button {
      width: 100%;
      padding: 16px;
      background: #F97316;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #ea580c; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .message { margin-top: 20px; padding: 15px; border-radius: 10px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .icon { font-size: 60px; margin-bottom: 20px; }
    .error-icon { color: #dc3545; }
    .success-icon { color: #28a745; }
    a { color: #7C3AED; text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
    .loading { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="logo">📡</div>
    <h1>CatchUpify</h1>
    <p class="tagline">Spontaneous Plans, Real Connections</p>
    <div id="content">
      <p>Loading...</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://czqlbtcnuvwzocphzojk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6cWxidGNudXZ3em9jcGh6b2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMTYyOTAsImV4cCI6MjA4NjY5MjI5MH0.Mko22ZSO-37G1lFgiR6Uc_11pvrAN4AIwpeMOR-Wpik';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const content = document.getElementById('content');

    async function init() {
      // Check for tokens in URL hash
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type = params.get('type');
      const error = params.get('error');
      const errorDescription = params.get('error_description');

      if (error) {
        showError(errorDescription || 'An error occurred');
        return;
      }

      if (type === 'recovery' && accessToken) {
        // Set the session with the recovery token
        const { data, error: sessionError } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if (sessionError) {
          showError('Invalid or expired reset link. Please request a new one.');
          return;
        }

        showResetForm();
      } else {
        showError('Invalid reset link. Please request a new password reset from the CatchUpify app.');
      }
    }

    function showResetForm() {
      content.innerHTML = `
        <form id="resetForm">
          <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" placeholder="Enter new password" minlength="6" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" minlength="6" required>
          </div>
          <button type="submit" id="submitBtn">Reset Password</button>
        </form>
      `;

      document.getElementById('resetForm').addEventListener('submit', handleReset);
    }

    async function handleReset(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');

      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      if (password.length < 6) {
        alert('Password must be at least 6 characters');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        alert('Error: ' + error.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
        return;
      }

      showSuccess();
    }

    function showSuccess() {
      content.innerHTML = `
        <div class="icon success-icon">✓</div>
        <h2 style="color: #28a745; margin-bottom: 15px;">Password Reset!</h2>
        <p style="color: #666; margin-bottom: 25px;">Your password has been successfully updated. You can now log in with your new password.</p>
        <a href="catchupify://login">Open CatchUpify App</a>
      `;
    }

    function showError(message) {
      content.innerHTML = `
        <div class="icon error-icon">✕</div>
        <h2 style="color: #dc3545; margin-bottom: 15px;">Invalid Reset Link</h2>
        <p style="color: #666; margin-bottom: 25px;">${message}</p>
        <a href="catchupify://">Back to App</a>
      `;
    }

    init();
  </script>
</body>
</html>
